// ── Expandable Card Component ──
function Exp({ icon, title, badge, badgeColor, preview, children, defaultOpen = false, borderColor }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="card" style={borderColor ? { borderLeft: "3px solid " + borderColor } : {}}>
      <div className="exp-hdr" onClick={() => setOpen(o => !o)}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, minWidth: 0 }}>
          {icon && <span style={{ fontSize: 22 }}>{icon}</span>}
          <span style={{ fontSize: 18, fontWeight: 700 }}>{title}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {badge && <div className="card-badge" style={{ background: (badgeColor || "rgba(0,212,170,0.12)"), color: badgeColor ? undefined : "#00d4aa" }}>{badge}</div>}
          <span className={"exp-arrow" + (open ? " open" : "")}>▸</span>
        </div>
      </div>
      {preview && <div className={"exp-preview" + (open ? " collapsed" : "")}>{preview}</div>}
      <div className={"exp-body" + (open ? " open" : "")}>{children}</div>
    </div>
  );
}

// ── Root App Wrapper with Auth ──
function RootApp() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    if (!sb) { setChecking(false); return; }
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user || null);
      setChecking(false);
    }).catch(() => setChecking(false));
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      setUser(session?.user || null);
    });
    return () => subscription.unsubscribe();
  }, []);

  if (checking) return React.createElement("div", { style: { minHeight: "100dvh", background: "#0b1120", display: "flex", alignItems: "center", justifyContent: "center" } },
    React.createElement("div", { style: { color: "#00d4aa", fontSize: 20, fontWeight: 800, fontFamily: "'Plus Jakarta Sans', sans-serif" } }, "Loading...")
  );

  if (!user) return React.createElement(AuthScreen, { onAuth: setUser });

  return React.createElement(App, { user });
}

// ── Markdown to HTML parser for AI Coach responses ──
const parseCoachMarkdown = (text) => {
  if (!text) return "";
  // Remove JSON blocks
  let clean = text.replace(/```json[\s\S]*?```\n*/g, "").trim();
  // Remove standalone triple backticks
  clean = clean.replace(/```\n?/g, "");
  // Bold: **text**
  clean = clean.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  clean = clean.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
  // Section headers that start with emoji + text or numbered emoji
  clean = clean.replace(/^([\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]\uFE0F?)\s*(.+)$/gmu, '<div style="margin-top:16px;margin-bottom:6px;font-size:15px;font-weight:800;color:#e2e8f0">$1 $2</div>');
  // Numbered headers like "1️⃣ Bold text" or "**1. Header**"
  // Lines starting with - bullet
  clean = clean.replace(/^[-–]\s+(.+)$/gm, '<div style="padding-left:12px;margin:4px 0;position:relative"><span style="position:absolute;left:0;color:rgba(0,212,170,0.6)">•</span>$1</div>');
  // Paragraphs: double newline
  clean = clean.replace(/\n\n+/g, '</p><p style="margin:10px 0;line-height:1.65">');
  // Single newlines
  clean = clean.replace(/\n/g, '<br/>');
  return '<p style="margin:0;line-height:1.65">' + clean + '</p>';
};

const aiTip = () => {
const r = parseInt(rec) || 0;
const now = new Date();
const hour = now.getHours();
const min = now.getMinutes();
const bedtime = 22; // 10 PM target bedtime
const hoursToSleep = bedtime - hour - (min > 30 ? 0 : 0) + (hour >= bedtime ? 24 : 0);
const woCal = tWoCal;
const ate = tCal;
const pro = tPro;
const proGoal = goals.pro;
const calGoal = goals.cal;
const calLeft = calGoal - ate;
const proLeft = proGoal - pro;
const hrvVal = parseInt(hrv) || 0;
const strainVal = parseFloat(strain) || 0;

let lines = [];
let color = S.green;

// ── MORNING (5am–11am) ──
if (hour >= 5 && hour < 11) {
if (r >= 67) {
lines.push(`Recovery ${r}% — you're green. 💪 It's a Strength day.`);
if (hrvVal >= 40) lines.push(`HRV at ${hrvVal}ms is solid — your nervous system is ready for heavy loads.`);
else if (hrvVal > 0) lines.push(`HRV at ${hrvVal}ms is a bit low for green. Consider moderate volume, listen to your body.`);
lines.push("Best window: Train in the next 2–3 hours while cortisol is naturally high.");
if (ate === 0) lines.push("⚡ Get 30–40g protein within the hour before training. Fairlife Elite or eggs + toast.");
color = S.green;
} else if (r >= 34) {
lines.push(`Recovery ${r}% — yellow zone. Moderate intensity today.`);
lines.push("Good options: Zone 2 cardio, light kettlebell work, or mobility session.");
lines.push("Skip heavy compounds. Your body is still processing yesterday.");
color = S.orange;
} else {
lines.push(`Recovery ${r}% — red zone. 🔴 Prioritize rest today.`);
lines.push("Light walk, stretching, or sauna only. No strength work.");
lines.push("Focus on nutrition and hydration. Extra sleep tonight if possible.");
color = S.red;
}
}

// ── MIDDAY (11am–2pm) ──
else if (hour >= 11 && hour < 14) {
if (woCal > 0) {
lines.push(`✓ ${tWoMin} min trained, ${woCal} cal burned. Solid morning.`);
if (proLeft > 80) lines.push(`⚠️ You need ${proLeft}g more protein today — prioritize protein at lunch.`);
else if (proLeft > 0) lines.push(`Protein tracking well — ${proLeft}g to go. Keep it up.`);
} else {
if (r >= 67) lines.push("Haven't trained yet — afternoon session is still effective. Don't skip it.");
else lines.push("Rest day tracking. Light walk after lunch helps digestion and blood sugar.");
}
if (calLeft > 800) lines.push(`${calLeft} cal remaining — good room for a solid lunch.`);
else if (calLeft < 200 && calLeft > 0) lines.push(`Only ${calLeft} cal left today — keep dinner light. Grilled fish + veggies.`);
color = r >= 67 ? S.green : r >= 34 ? S.orange : S.red;
}

// ── AFTERNOON (2pm–5pm) ──
else if (hour >= 14 && hour < 17) {
if (woCal === 0 && r >= 50) {
lines.push("Afternoon training window open — cortisol + body temp peak between 2–5 PM.");
lines.push("This is actually your strongest training window physiologically.");
} else if (woCal > 0) {
lines.push(`Training done — ${tWoMin} min logged. Focus on recovery nutrition.`);
if (proLeft > 60) lines.push(`⚠️ ${proLeft}g protein still needed — double down at dinner.`);
}
if (calLeft > 600) lines.push("Plenty of room for a quality dinner. Plan something protein-heavy.");
lines.push("Good time for an outdoor walk if weather allows. AQI and UV are in your dashboard.");
color = r >= 50 ? S.green : S.orange;
}

// ── EARLY EVENING (5pm–7pm) ──
else if (hour >= 17 && hour < 19) {
lines.push(`${hoursToSleep} hours to bedtime.`);
if (woCal === 0 && r >= 50) {
lines.push("If you're training now — keep it moderate. You need time to wind down before sleep.");
lines.push("Best options: 30–40 min strength at moderate intensity, or Zone 2 cardio.");
lines.push("🚫 Skip: Heavy deadlifts, assault bike HIIT, or anything that spikes strain above 14.");
}
if (proLeft > 40) lines.push(`Still need ${proLeft}g protein — dinner is your last big chance.`);
if (calLeft < 0) lines.push(`⚠️ Over calorie target by ${Math.abs(calLeft)} cal. Keep evening light.`);
color = S.orange;
}

// ── LATE EVENING (7pm–9pm) ──
else if (hour >= 19 && hour < 21) {
lines.push(`⏰ ${hoursToSleep} hours to bed. Start winding down.`);

if (woCal === 0 && r >= 50) {
lines.push("Training this late is risky for sleep. If you must: light Zone 2 walk only, 20 min max.");
lines.push("🚫 No strength training, HIIT, or heavy cardio. Elevated HR takes 60–90 min to normalize.");
}

// Cold plunge warning
lines.push("🧊 Cold plunge now? Skip it. Norepinephrine + adrenaline spike will keep you wired.");
lines.push("Cold exposure within 90 min of bed delays deep sleep onset for most people.");
lines.push("✅ Better options: Warm shower, magnesium glycinate, nasal breathing, 10 min light walk.");

// Sauna timing
if (hour < 20) {
lines.push("🧖 Infrared sauna is OK now if done by 8:30 PM — follow with warm (not cold) shower.");
} else {
lines.push("🧖 Too late for sauna — the heat rebound can delay sleep. Save it for tomorrow.");
}

if (proLeft > 20) lines.push(`⚡ Quick protein: Fairlife Elite (42g) or Barebells bar before 9 PM.`);
color = S.purple;
}

// ── PRE-SLEEP (9pm–11pm) ──
else if (hour >= 21 && hour < 23) {
lines.push(`🌙 ${hoursToSleep <= 1 ? "Nearly" : hoursToSleep + " hours to"} bedtime. Protect your sleep.`);
lines.push("🚫 No training, cold plunge, or sauna. Sympathetic activation will cost you deep sleep.");
lines.push("🚫 No heavy meals. Digestion competes with sleep restoration.");
lines.push("✅ Dim lights. Stop screens or use night mode. Nasal breathing.");
lines.push("✅ CPAP ready. Aim for 7+ hours mask time — your AHI has been excellent.");

if (ate > 0 && calLeft < -300) {
lines.push(`Note: ${Math.abs(calLeft)} cal over target. Don't stress — one day doesn't define the journey. 280→${wt} speaks for itself.`);
}

// Sleep optimization
if (hrvVal > 0 && hrvVal < 30) {
lines.push(`⚠️ HRV at ${hrvVal}ms is low. Extra sleep will help recovery. Try for 8+ hours tonight.`);
}
color = S.purple;
}

// ── LATE NIGHT / EARLY MORNING (11pm–5am) ──
else {
lines.push("🌙 You should be sleeping, Scott. Every hour before midnight counts double for recovery.");
lines.push("If you can't sleep: legs up the wall, 4-7-8 breathing, no phone.");
lines.push("Your CPAP compliance has been great — trust the process.");
color = S.red;
}

// ── UNIVERSAL: Nutrition gap warning ──
if (hour >= 18 && proLeft > 60) {
lines.push(`🚨 Protein emergency: ${proLeft}g short with limited meals left. Consider a double shake.`);
}

return { text: lines.join("\n"), color };
};

<div className="modal-title">💊 Add Medication</div>

<div className="inp-label">Medication Name</div>
<input className="inp" style={{ textAlign: "left", fontSize: 16, marginBottom: 10 }} placeholder="e.g. Testosterone Cypionate" value={medForm.name} onChange={e => setMedForm(p => ({...p, name: e.target.value}))} />

<div className="inp-label">Dosage</div>
<input className="inp" style={{ textAlign: "left", fontSize: 16, marginBottom: 10 }} placeholder="e.g. 200mg" value={medForm.dose} onChange={e => setMedForm(p => ({...p, dose: e.target.value}))} />

<div className="inp-label">Type</div>
<div className="tog" style={{ marginBottom: 12, flexWrap: "wrap" }}>
{["pill", "injection", "topical", "inhaler", "other"].map(t => (
<div key={t} className={`tog-btn ${medForm.type === t ? "on" : ""}`} style={{ flex: "1 1 30%", textAlign: "center", padding: "8px 6px" }}
onClick={() => setMedForm(p => ({...p, type: t}))}>{t === "pill" ? "💊" : t === "injection" ? "💉" : t === "topical" ? "🧴" : t === "inhaler" ? "🫁" : "📦"} {t}</div>
))}
</div>

<div className="inp-label">Frequency</div>
<div className="tog" style={{ marginBottom: 12 }}>
{["daily", "weekly", "biweekly", "monthly"].map(f => (
<div key={f} className={`tog-btn ${medForm.freq === f ? "on" : ""}`} style={{ flex: 1, textAlign: "center" }}
onClick={() => setMedForm(p => ({...p, freq: f, day: f === "daily" ? "Daily" : p.day === "Daily" ? "Monday" : p.day}))}>{f}</div>
))}
</div>

{medForm.freq !== "daily" && (
<>
<div className="inp-label">Day of Week</div>
<div className="tog" style={{ marginBottom: 12, flexWrap: "wrap" }}>
{["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"].map(d => (
<div key={d} className={`tog-btn ${medForm.day === d ? "on" : ""}`} style={{ flex: "1 1 30%", textAlign: "center", padding: "8px 4px", fontSize: 13 }}
onClick={() => setMedForm(p => ({...p, day: d}))}>{d.slice(0, 3)}</div>
))}
</div>
</>
)}

<div className="sg" style={{ marginBottom: 12 }}>
<div><div className="inp-label">Time</div><input className="inp" type="time" value={medForm.time} onChange={e => setMedForm(p => ({...p, time: e.target.value}))} style={{ fontSize: 16 }} /></div>
</div>

<div className="inp-label">Notes (optional)</div>
<input className="inp" style={{ textAlign: "left", fontSize: 16, marginBottom: 14 }} placeholder="Effects on training, side effects..." value={medForm.notes} onChange={e => setMedForm(p => ({...p, notes: e.target.value}))} />

<button className="btn btn-g" onClick={() => {
if (!medForm.name) { show("Enter medication name"); return; }
setMeds(p => [...p, {...medForm}]);
show("✓ Added " + medForm.name);
setMedModal(false);
}}>Save Medication</button>
</div>
</div>
)}

{/* ── Account Settings Modal ── */}
{accountModal && (
<div className="overlay" onClick={(e) => { if (e.target === e.currentTarget) setAccountModal(false); }}>
<div className="modal">
<div className="modal-bar" />
<div className="modal-title">👤 Account & Health Profile</div>

<div className="inp-label">Display Name</div>
<input className="inp" style={{ textAlign: "left", fontSize: 16, marginBottom: 10 }} value={userProfile.name || user?.user_metadata?.display_name || ""} onChange={e => setUserProfile(p => ({...p, name: e.target.value}))} />

<div className="inp-label">Email</div>
<div style={{ padding: "12px 16px", background: "rgba(255,255,255,0.03)", border: "1px solid " + S.border, borderRadius: 14, color: S.t2, fontSize: 15, marginBottom: 10 }}>{user?.email || "—"}</div>

<div className="sg" style={{ marginBottom: 12 }}>
<div><div className="inp-label">Age</div><input className="inp" type="number" inputMode="numeric" value={userProfile.age || ""} onChange={e => setUserProfile(p => ({...p, age: e.target.value}))} /></div>
<div><div className="inp-label">Sex</div>
<div className="tog">
{["male", "female"].map(s => (
<div key={s} className={`tog-btn ${userProfile.sex === s ? "on" : ""}`} style={{ flex: 1, textAlign: "center" }}
onClick={() => setUserProfile(p => ({...p, sex: s}))}>{s === "male" ? "♂ Male" : "♀ Female"}</div>
))}
</div>
</div>
</div>

<div className="sg" style={{ marginBottom: 12 }}>
<div><div className="inp-label">Height</div><input className="inp" style={{ textAlign: "left", fontSize: 16 }} placeholder="e.g. 5ft 10in" value={userProfile.height || ""} onChange={e => setUserProfile(p => ({...p, height: e.target.value}))} /></div>
<div><div className="inp-label">Start Weight (lbs)</div><input className="inp" type="number" inputMode="numeric" value={userProfile.startWeight || "280"} onChange={e => setUserProfile(p => ({...p, startWeight: e.target.value}))} /></div>
</div>

<div className="sg" style={{ marginBottom: 12 }}>
<div><div className="inp-label">Target Weight (lbs)</div><input className="inp" type="number" inputMode="numeric" value={targetWeight || ""} onChange={e => setTargetWeight(e.target.value)} /></div>
<div><div className="inp-label">Current Weight</div><div className="inp" style={{ background: "rgba(0,212,170,0.06)", borderColor: S.green, color: S.green, fontWeight: 800 }}>{wt || "--"} lbs</div></div>
</div>

{wt && targetWeight && <div style={{ padding: "10px 14px", background: "rgba(0,212,170,0.06)", borderRadius: 12, marginBottom: 14, fontSize: 15, color: S.t2 }}>
{parseFloat(wt) > parseFloat(targetWeight) ? (
<span>📉 <b style={{ color: S.green }}>{(parseFloat(wt) - parseFloat(targetWeight)).toFixed(1)} lbs</b> to go! Down <b style={{ color: S.cyan }}>{(parseFloat(userProfile.startWeight || 280) - parseFloat(wt)).toFixed(1)} lbs</b> from start.</span>
) : (
<span>🎯 <b style={{ color: S.green }}>At or below target!</b> Keep it up!</span>
)}
</div>}

<div className="inp-label">Health Conditions</div>
<input className="inp" style={{ textAlign: "left", fontSize: 14, marginBottom: 14 }} placeholder="e.g. sleep apnea, hypertension" value={(userProfile.conditions || []).join(", ")} onChange={e => setUserProfile(p => ({...p, conditions: e.target.value.split(",").map(c => c.trim()).filter(Boolean)}))} />

{/* ── Medications Section ── */}
<div style={{ borderTop: "1px solid " + S.border, paddingTop: 14, marginTop: 4, marginBottom: 14 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
<div style={{ fontSize: 16, fontWeight: 800 }}>💊 Medications</div>
<button style={{ background: "rgba(168,85,247,0.1)", color: S.purple, border: "1.5px solid rgba(168,85,247,0.3)", borderRadius: 10, padding: "6px 12px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}
onClick={() => { setMedForm({ name: "", dose: "", freq: "daily", day: "Daily", time: "08:00", type: "pill", notes: "" }); setMedModal(true); setAccountModal(false); }}>+ Add</button>
</div>
{meds.length === 0 && <div style={{ fontSize: 14, color: S.t3, marginBottom: 10 }}>No medications added</div>}
{meds.map((m, i) => (
<div key={i} style={{ background: "rgba(168,85,247,0.06)", border: "1px solid rgba(168,85,247,0.2)", borderRadius: 12, padding: "10px 14px", marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
<div>
<div style={{ fontSize: 15, fontWeight: 800 }}>{m.name}</div>
<div style={{ fontSize: 13, color: S.purple }}>{m.dose} · {m.type} · {m.freq}</div>
</div>
<button style={{ background: "none", border: "none", color: S.t3, fontSize: 18, cursor: "pointer", padding: "4px 8px" }}
onClick={() => { if (confirm("Remove " + m.name + "?")) setMeds(p => p.filter((_, j) => j !== i)); }}>×</button>
</div>
))}
</div>

{/* ── Bloodwork Section ── */}
<div style={{ borderTop: "1px solid " + S.border, paddingTop: 14, marginBottom: 14 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
<div style={{ fontSize: 16, fontWeight: 800 }}>🩸 Bloodwork</div>
<div style={{ fontSize: 14, color: S.t3 }}>{bloodwork.length > 0 ? bloodwork.length + " test" + (bloodwork.length > 1 ? "s" : "") : "None"}</div>
</div>
{bloodwork.length > 0 && (() => {
const latest = bloodwork[bloodwork.length - 1];
const testDate = new Date(latest.date);
const daysSince = Math.floor((Date.now() - testDate.getTime()) / (1000 * 60 * 60 * 24));
return <div style={{ fontSize: 14, color: daysSince > 365 ? S.red : S.t3, marginBottom: 8 }}>Last: {testDate.toLocaleDateString()} ({daysSince}d ago){daysSince > 180 ? " — schedule updated labs" : ""}</div>;
})()}
{bloodwork.length > 0 && bloodwork.slice(-1).map((bw, bi) => (
<div key={bi} style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
{Object.entries(bw.markers || {}).slice(0, 8).map(([key, val]) => {
const RANGES = { glucose: [70,100], a1c: [0,5.7], testosterone: [300,1000], total_cholesterol: [0,200], ldl: [0,100], hdl: [40,999], triglycerides: [0,150], tsh: [0.4,4.0], psa: [0,4] };
const range = RANGES[key];
const v = parseFloat(val);
const ok = !range || (v >= range[0] && v <= range[1]);
return <span key={key} className={`bw-marker ${ok ? "bw-normal" : "bw-flag"}`}>{key.replace(/_/g, " ")}: {val}</span>;
})}
{Object.keys(bw.markers || {}).length > 8 && <span style={{ fontSize: 13, color: S.t3 }}>+{Object.keys(bw.markers).length - 8} more</span>}
</div>
))}
<div style={{ fontSize: 14, color: S.t3 }}>Upload bloodwork PDF on the IQ tab for AI extraction</div>
</div>

<button className="btn btn-g" onClick={() => { show("✓ Profile saved"); setAccountModal(false); }}>Save Profile</button>

<button className="btn" style={{ marginTop: 10, background: "rgba(239,68,68,0.08)", color: S.red, border: "1.5px solid rgba(239,68,68,0.25)" }}
onClick={async () => { await sb.auth.signOut(); }}>Sign Out</button>
</div>
</div>
)}
</div>
</>
);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RootApp));
</script>
</body>
</html>
