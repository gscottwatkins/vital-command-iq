const Ring = ({ val, max, color, label, size = 80 }) => {
const pct = Math.min((val / max) * 100, 100);
const r = (size - 10) / 2, C = 2 * Math.PI * r, off = C - (pct / 100) * C;
return (
<div style={{ textAlign: "center", flex: "1 1 0" }}>
<div style={{ position: "relative", width: size, height: size, margin: "0 auto" }}>
<svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
<circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="7" />
<circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="7"
strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
style={{ transition: "stroke-dashoffset 0.5s ease" }} />
</svg>
<div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>

</div>
</div>
<div style={{ fontSize: 11, color: S.t2, fontWeight: 700, marginTop: 4, letterSpacing: 0.5 }}>{label}</div>
</div>
);

// Weather
useEffect(() => {
if (!navigator.geolocation) return;
navigator.geolocation.getCurrentPosition(async (pos) => {
try {
const { latitude: la, longitude: lo } = pos.coords;
const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index&hourly=temperature_2m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=1&timezone=auto`);
const d = await r.json();
setWeather({
temp: Math.round(d.current.temperature_2m), feels: Math.round(d.current.apparent_temperature),
hum: d.current.relative_humidity_2m, wind: Math.round(d.current.wind_speed_10m),
uv: d.current.uv_index, code: d.current.weather_code,
hourly: d.hourly.time.slice(0, 12).map((t, i) => ({
hr: new Date(t).toLocaleTimeString([], { hour: "numeric" }),
temp: Math.round(d.hourly.temperature_2m[i]), code: d.hourly.weather_code[i],
})),
});
} catch(e) { console.log(e); }
});
}, []);

// ── Persistent Storage — Load on mount ──
useEffect(() => {
const loadAll = async () => {
try {
const r = await window.storage.get("vciq-data");
if (r && r.value) {
const d = JSON.parse(r.value);
if (d.wt) setWt(d.wt); if (d.bf) setBf(d.bf);
if (d.mm) setMm(d.mm); if (d.vf) setVf(d.vf);
if (d.rec) setRec(d.rec); if (d.hrv) setHrv(d.hrv);
if (d.slp) setSlp(d.slp); if (d.strain) setStrain(d.strain);
if (d.ahi) setAhi(d.ahi); if (d.cpH) setCpH(d.cpH); if (d.cpM) setCpM(d.cpM);
if (d.bp) setBp(d.bp);
if (d.foods) setFoods(d.foods);
if (d.workouts) setWkts(d.workouts);

}
} catch(e) { console.log("Storage load:", e); }
setStorageReady(true);
};
loadAll();
}, []);

// ── Persistent Storage — Auto-save on data change ──
const saveTimer = useRef(null);

bp, foods, workouts, savedAt: new Date().toISOString(),
}));
} catch(e) { console.log("Storage save:", e); }
}, 1500);
return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
}, [wt, bf, mm, vf, rec, hrv, slp, strain, ahi, cpH, cpM, bp, foods, workouts, storageReady]);

const wIcon = (c) => c <= 1 ? "☀️" : c <= 3 ? "⛅" : c <= 48 ? "☁️" : c <= 67 ? "🌧️" : c <= 82 ? "🌦️" : "⛈️";

const bpCat = (s, d) => {
if (s < 120 && d < 80) return { l: "Normal", c: S.green };

if (s < 140 || d < 90) return { l: "Stage 1", c: S.orange };
return { l: "Stage 2", c: S.red };
};

const recColor = (v) => +v >= 67 ? S.green : +v >= 34 ? S.orange : S.red;

const hr = new Date().getHours();
const greet = hr < 12 ? "Good morning" : hr < 17 ? "Good afternoon" : "Good evening";

const aiTip = () => {
const r = parseInt(rec) || 0;
const now = new Date();
const hour = now.getHours();
const min = now.getMinutes();
const bedtime = 22; // 10 PM target bedtime
const hoursToSleep = bedtime - hour - (min > 30 ? 0 : 0) + (hour >= bedtime ? 24 : 0);
const woCal = tWoCal;
const ate = tCal;
const pro = tPro;
const proGoal = goals.pro;
const calGoal = goals.cal;
const calLeft = calGoal - ate;
const proLeft = proGoal - pro;
const hrvVal = parseInt(hrv) || 0;
const strainVal = parseFloat(strain) || 0;

let lines = [];
let color = S.green;

// ── MORNING (5am–11am) ──
if (hour >= 5 && hour < 11) {
if (r >= 67) {
lines.push(`Recovery ${r}% — you're green. 💪 It's a Strength day.`);
if (hrvVal >= 40) lines.push(`HRV at ${hrvVal}ms is solid — your nervous system is ready for heavy loads.`);
else if (hrvVal > 0) lines.push(`HRV at ${hrvVal}ms is a bit low for green. Consider moderate volume, listen to your body.`);
lines.push("Best window: Train in the next 2–3 hours while cortisol is naturally high.");
if (ate === 0) lines.push("⚡ Get 30–40g protein within the hour before training. Fairlife Elite or eggs + toast.");
color = S.green;
} else if (r >= 34) {
lines.push(`Recovery ${r}% — yellow zone. Moderate intensity today.`);
lines.push("Good options: Zone 2 cardio, light kettlebell work, or mobility session.");
lines.push("Skip heavy compounds. Your body is still processing yesterday.");
color = S.orange;
} else {
lines.push(`Recovery ${r}% — red zone. 🔴 Prioritize rest today.`);
lines.push("Light walk, stretching, or sauna only. No strength work.");
lines.push("Focus on nutrition and hydration. Extra sleep tonight if possible.");
color = S.red;
}
}

// ── MIDDAY (11am–2pm) ──
else if (hour >= 11 && hour < 14) {
if (woCal > 0) {
lines.push(`✓ ${tWoMin} min trained, ${woCal} cal burned. Solid morning.`);
if (proLeft > 80) lines.push(`⚠️ You need ${proLeft}g more protein today — prioritize protein at lunch.`);
else if (proLeft > 0) lines.push(`Protein tracking well — ${proLeft}g to go. Keep it up.`);
} else {
if (r >= 67) lines.push("Haven't trained yet — afternoon session is still effective. Don't skip it.");
else lines.push("Rest day tracking. Light walk after lunch helps digestion and blood sugar.");
}
if (calLeft > 800) lines.push(`${calLeft} cal remaining — good room for a solid lunch.`);
else if (calLeft < 200 && calLeft > 0) lines.push(`Only ${calLeft} cal left today — keep dinner light. Grilled fish + veggies.`);
color = r >= 67 ? S.green : r >= 34 ? S.orange : S.red;
}

// ── AFTERNOON (2pm–5pm) ──
else if (hour >= 14 && hour < 17) {
if (woCal === 0 && r >= 50) {
lines.push("Afternoon training window open — cortisol + body temp peak between 2–5 PM.");
lines.push("This is actually your strongest training window physiologically.");
} else if (woCal > 0) {
lines.push(`Training done — ${tWoMin} min logged. Focus on recovery nutrition.`);
if (proLeft > 60) lines.push(`⚠️ ${proLeft}g protein still needed — double down at dinner.`);
}
if (calLeft > 600) lines.push("Plenty of room for a quality dinner. Plan something protein-heavy.");
lines.push("Good time for an outdoor walk if weather allows. AQI and UV are in your dashboard.");
color = r >= 50 ? S.green : S.orange;
}

// ── EARLY EVENING (5pm–7pm) ──
else if (hour >= 17 && hour < 19) {
lines.push(`${hoursToSleep} hours to bedtime.`);
if (woCal === 0 && r >= 50) {
lines.push("If you're training now — keep it moderate. You need time to wind down before sleep.");
lines.push("Best options: 30–40 min strength at moderate intensity, or Zone 2 cardio.");
lines.push("🚫 Skip: Heavy deadlifts, assault bike HIIT, or anything that spikes strain above 14.");
}
if (proLeft > 40) lines.push(`Still need ${proLeft}g protein — dinner is your last big chance.`);
if (calLeft < 0) lines.push(`⚠️ Over calorie target by ${Math.abs(calLeft)} cal. Keep evening light.`);
color = S.orange;
}

// ── LATE EVENING (7pm–9pm) ──
else if (hour >= 19 && hour < 21) {
lines.push(`⏰ ${hoursToSleep} hours to bed. Start winding down.`);

if (woCal === 0 && r >= 50) {
lines.push("Training this late is risky for sleep. If you must: light Zone 2 walk only, 20 min max.");
lines.push("🚫 No strength training, HIIT, or heavy cardio. Elevated HR takes 60–90 min to normalize.");
}

// Cold plunge warning
lines.push("🧊 Cold plunge now? Skip it. Norepinephrine + adrenaline spike will keep you wired.");
lines.push("Cold exposure within 90 min of bed delays deep sleep onset for most people.");
lines.push("✅ Better options: Warm shower, magnesium glycinate, nasal breathing, 10 min light walk.");

// Sauna timing
if (hour < 20) {
lines.push("🧖 Infrared sauna is OK now if done by 8:30 PM — follow with warm (not cold) shower.");
} else {
lines.push("🧖 Too late for sauna — the heat rebound can delay sleep. Save it for tomorrow.");
}

if (proLeft > 20) lines.push(`⚡ Quick protein: Fairlife Elite (42g) or Barebells bar before 9 PM.`);
color = S.purple;
}

// ── PRE-SLEEP (9pm–11pm) ──
else if (hour >= 21 && hour < 23) {
lines.push(`🌙 ${hoursToSleep <= 1 ? "Nearly" : hoursToSleep + " hours to"} bedtime. Protect your sleep.`);
lines.push("🚫 No training, cold plunge, or sauna. Sympathetic activation will cost you deep sleep.");
lines.push("🚫 No heavy meals. Digestion competes with sleep restoration.");
lines.push("✅ Dim lights. Stop screens or use night mode. Nasal breathing.");
lines.push("✅ CPAP ready. Aim for 7+ hours mask time — your AHI has been excellent.");

if (ate > 0 && calLeft < -300) {
lines.push(`Note: ${Math.abs(calLeft)} cal over target. Don't stress — one day doesn't define the journey. 280→${wt} speaks for itself.`);
}

// Sleep optimization
if (hrvVal > 0 && hrvVal < 30) {
lines.push(`⚠️ HRV at ${hrvVal}ms is low. Extra sleep will help recovery. Try for 8+ hours tonight.`);
}

else {

if (hour >= 18 && proLeft > 60) {

return { text: lines.join("\n"), color };

cpap: { ahi, hours: cpH, mask: cpM },

};

const userContent = [];
aiUploads.forEach(img => {
userContent.push({ type: "image", source: { type: "base64", media_type: img.type, data: img.data.split(",")[1] } });
});
userContent.push({
type: "text",
text: `Health context: ${JSON.stringify(ctx)}\n\nRequest: ${aiText || "Analyze all uploaded screenshots. Extract every metric you can see. Return a JSON block with extracted values, then provide insights and recommendations."}`
});

try {
const res = await fetch("https://api.anthropic.com/v1/messages", {
method: "POST", headers: { "Content-Type": "application/json" },
body: JSON.stringify({
model: "claude-sonnet-4-20250514", max_tokens: 1500,
system: `You are VitalCommand AI for Scott Watkins (58, lost 70+lbs 280→${wt || 210}). He trains full-body strength + cardio with kettlebells, barbells, assault bike, rower, elliptical. Tracks WHOOP, Garmin, Withings scale, CPAP/myAir. Protein goal 200g/day, 2000 cal/day.

CRITICAL: When analyzing device screenshots, ALWAYS start your response with a JSON block wrapped in \`\`\`json ... \`\`\` containing ALL extracted metrics. Use these exact keys (omit any you can't find):
{
  "weight": number (lbs),
  "body_fat": number (%),
  "muscle_mass": number (lbs),
  "visceral_fat": number (rating),
  "recovery": number (% 0-100),
  "hrv": number (ms),
  "rhr": number (resting heart rate bpm),
  "sleep_hours": number,
  "sleep_score": number (% 0-100),
  "strain": number (0-21),
  "spo2": number (%),
  "resp_rate": number (breaths/min),
  "ahi": number,
  "cpap_hours": number,
  "cpap_mask": number (% seal/fit),
  "steps": number,
  "calories_burned": number,
  "bp_systolic": number,
  "bp_diastolic": number,
  "bp_pulse": number
}

After the JSON block, provide brief actionable insights. Be concise and direct.`,
messages: [{ role: "user", content: userContent }],
}),
});
const data = await res.json();
const text = data.content?.map(c => c.text || "").join("\n") || "No response.";
setAiResp(text);

// Extract structured JSON from AI response
try {
const jsonMatch = text.match(/```json\s*([\s\S]*?)```/);
if (jsonMatch) {
const extracted = JSON.parse(jsonMatch[1]);
setAiExtracted(extracted);
show("✓ Metrics extracted — review below");
} else {
// Fallback regex extraction
const ex = {};
const tryEx = (pattern, key) => { const m = text.match(pattern); if (m) ex[key] = m[1]; };
tryEx(/weight[:\s]*(\d+\.?\d*)\s*(?:lbs|pounds)?/i, "weight");
tryEx(/body\s*fat[:\s]*(\d+\.?\d*)\s*%?/i, "body_fat");
tryEx(/muscle\s*mass[:\s]*(\d+\.?\d*)/i, "muscle_mass");
tryEx(/visceral\s*fat[:\s]*(\d+\.?\d*)/i, "visceral_fat");
tryEx(/recovery[:\s]*(\d+)\s*%?/i, "recovery");
tryEx(/hrv[:\s]*(\d+)\s*(?:ms)?/i, "hrv");
tryEx(/strain[:\s]*(\d+\.?\d*)/i, "strain");
tryEx(/ahi[:\s]*(\d+\.?\d*)/i, "ahi");
tryEx(/(?:cpap|mask)\s*(?:hours?|time)[:\s]*(\d+\.?\d*)/i, "cpap_hours");
tryEx(/(?:mask|seal)\s*(?:fit|%|score)[:\s]*(\d+)/i, "cpap_mask");
tryEx(/sleep\s*(?:hours?|duration)[:\s]*(\d+\.?\d*)/i, "sleep_hours");
tryEx(/sleep\s*(?:score|quality)[:\s]*(\d+)/i, "sleep_score");
tryEx(/(?:resting\s*)?(?:heart\s*rate|rhr|pulse)[:\s]*(\d+)/i, "rhr");
tryEx(/steps[:\s]*(\d[\d,]*)/i, "steps");
if (Object.keys(ex).length > 0) {
setAiExtracted(ex);
show("✓ Metrics found — review below");
}
}
} catch(e) { console.log("Extract error:", e); }
} catch(err) {
setAiResp("Connection error. Check your network and try again.");
}
setAiLoading(false);
}}>

{tCal} cal · {tPro}g protein · {tCarb}g carbs · {tFat}g fat
</div>
</div>
<div className="stat">
<div className="stat-label">Today's Training</div>
<div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 14, color: S.t2, marginTop: 6 }}>
{tWoMin} min · {tWoCal} cal burned · {workouts.length} exercises
</div>
</div>
</div>

<div className="card">
<div className="card-title" style={{ marginBottom: 14 }}>⚙️ Goals</div>
<div style={{ fontSize: 13, color: S.t2, lineHeight: 2 }}>
Daily Calories: <span style={{ color: S.t1, fontWeight: 700 }}>2,000</span><br />
Daily Protein: <span style={{ color: S.t1, fontWeight: 700 }}>200g</span><br />
Daily Carbs: <span style={{ color: S.t1, fontWeight: 700 }}>150g</span><br />
Daily Fat: <span style={{ color: S.t1, fontWeight: 700 }}>65g</span><br />
Target Weight: <span style={{ color: S.green, fontWeight: 700 }}>199 lbs</span><br />
Visceral Fat Target: <span style={{ color: S.green, fontWeight: 700 }}>7</span>
</div>
</div>

<div className="card">
<div className="card-title" style={{ marginBottom: 14 }}>💾 Data Storage</div>
<div style={{ fontSize: 13, color: S.t2, marginBottom: 12 }}>
All data auto-saves and persists between sessions.
</div>
<button className="btn" style={{ background: "rgba(239,68,68,0.1)", color: S.red, border: `1.5px solid rgba(239,68,68,0.3)`, marginBottom: 8 }}
onClick={async () => {
if (confirm("Clear today's food log and workout log? (Metrics stay)")) {
setFoods([]); setWkts([]);
show("✓ Today's logs cleared");
}
}}>Clear Today's Food & Workout Log</button>
<button className="btn" style={{ background: "rgba(239,68,68,0.05)", color: S.red, border: `1.5px solid rgba(239,68,68,0.15)` }}
onClick={async () => {
if (confirm("Reset ALL data including metrics? This cannot be undone.")) {
try { await window.storage.delete("vciq-data"); } catch(e) {}
setFoods([]); setWkts([]); setBp([]);
setWt("213.8"); setBf("39.4"); setMm("165.8"); setVf("8");
setRec("75"); setHrv("25"); setSlp(""); setStrain("");
setAhi(""); setCpH(""); setCpM("");
show("✓ All data reset");
}
}}>Reset All Data</button>
</div>
</div>
)}

<div className="brain" onClick={() => setTab("ai")}>🧠</div>

<div className="bnav">
{[
{ id: "home", icon: "🏠", label: "Home" },
{ id: "food", icon: "🍽️", label: "Food" },
{ id: "ai", icon: "🧠", label: "" },
{ id: "train", icon: "🏋️", label: "Train" },
{ id: "more", icon: "📊", label: "More" },
].map(n => (
<div key={n.id} className={`bnav-item ${tab === n.id ? "on" : ""}`} onClick={() => setTab(n.id)}>
<div className="bnav-icon" style={n.id === "ai" ? { fontSize: 30, marginTop: -16, width: 56, height: 56, borderRadius: "50%", background: `linear-gradient(135deg,${S.green},${S.cyan})`, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 20px rgba(0,212,170,0.3)" } : {}}>{n.icon}</div>
<div className="bnav-label">{n.label}</div>
</div>
))}
</div>

{toast && <div className="toast">{toast}</div>}
{renderModal()}
</div>
</>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
